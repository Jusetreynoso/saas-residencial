<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registrar Abono</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #f8f9fa; 
            font-family: 'Inter', sans-serif;
        }
        
        .card, .card-menu { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05); 
            border-radius: 12px; 
            transition: all 0.3s ease;
        }
        
        .card-menu:hover, .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08); 
        }

        .btn { transition: all 0.3s ease; border-radius: 8px; }
    </style>
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary mb-4 shadow">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'dashboard' %}">⬅️ Volver al Dashboard</a>
        <span class="text-white">Registro de Abonos / Adelantos</span>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg border-0">
                <div class="card-header bg-dark text-white fw-bold">
                    ➕ Registrar Nuevo Abono
                </div>
                <div class="card-body p-4">
                    
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="fw-bold form-label">Vecino / Propietario</label>
                            {{ form.usuario }}
                        </div>

                        <div class="mb-3">
                            <label class="fw-bold form-label">Monto Recibido ($)</label>
                            <input type="number" step="0.01" name="monto" class="form-control form-control-lg" placeholder="0.00" required>
                        </div>

                        <div class="mb-3">
                            <label class="fw-bold form-label">Destino del Dinero</label>
                            <select name="tipo_pago" class="form-select border-primary" required>
                                <option value="" selected disabled>-- Seleccione Destino --</option>
                                <option value="MANTENIMIENTO">🏢 Cuotas / Mantenimiento</option>
                                <option value="GAS">🔥 Consumo de Gas</option>
                            </select>
                            <div class="form-text text-muted">
                                El dinero se usará para pagar deudas de este tipo. Si sobra, se guardará en el saldo a favor correspondiente.
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="fw-bold form-label">Concepto / Nota</label>
                            <input type="text" name="concepto" class="form-control" placeholder="Ej: Adelanto mes próximo" value="Abono a cuenta">
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-success btn-lg fw-bold">
                                💾 Registrar Abono
                            </button>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
