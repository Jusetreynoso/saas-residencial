<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Centro de Reportería</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>📊 Centro de Reportería</h2>
        <a href="{% url 'dashboard' %}" class="btn btn-secondary">⬅ Volver al Dashboard</a>
    </div>

    <div class="row">
        <div class="col-md-4 mb-3">
            <div class="card h-100 shadow-sm border-primary">
                <div class="card-body text-center">
                    <h1 class="display-4">📅</h1>
                    <h5 class="card-title fw-bold">Flujo de Caja Mensual</h5>
                    <p class="text-muted small">Genera el resumen de entradas y salidas de un mes específico y cuadra tu banco.</p>
                    <a href="{% url 'reporte_mensual_dinamico' %}" class="btn btn-primary w-100">Generar Reporte</a>
                </div>
            </div>
        </div>
        
        <div class="col-md-4 mb-3">
            <div class="card h-100 shadow-sm border-secondary opacity-50">
                <div class="card-body text-center">
                    <h1 class="display-4">👥</h1>
                    <h5 class="card-title fw-bold">Reporte de Morosidad</h5>
                    <p class="text-muted small">Próximamente: Listado detallado de vecinos con deudas históricas.</p>
                    <button class="btn btn-secondary w-100" disabled>Próximamente</button>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
